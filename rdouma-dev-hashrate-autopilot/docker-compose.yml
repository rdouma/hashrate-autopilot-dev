# Umbrel docker-compose for Hashrate Autopilot.
#
# Two services:
#
# - `app_proxy` is Umbrel's auth + reverse-proxy sidecar. It terminates
#   Tor / LAN traffic in front of our app. PROXY_AUTH_ADD=false because
#   the daemon already runs its own Basic Auth (the password the wizard
#   creates) - we don't want a double login.
#
# - `web` is the daemon + dashboard, pulled from GHCR. It listens on
#   port 3010 and reads/writes its single state directory at /app/data,
#   which is bind-mounted to Umbrel's per-app persistent storage.
#
# Cross-app reach via Umbrel's shared network:
#
# - We declare `datum` as a dependency in umbrel-app.yml, which makes
#   Umbrel join our containers to the Datum app's docker-compose
#   project network. From there we can address Datum's main service
#   container by its compose-generated hostname (`datum_datum_1`).
#   Datum's HTTP API is configured to listen on :21000 inside its
#   container (the Umbrel package overrides Datum's default :7152 to
#   match its app_proxy port). The API port itself is *not* published
#   to the host network, but cross-container access on the shared
#   network bypasses that constraint and the app_proxy auth layer.
#   We pre-set the daemon's `datum_api_url` config value via the
#   BHA_DATUM_API_URL env override, so the wizard never needs to ask.
#
# - We declare `electrs` as a dependency, joining our containers to
#   the Electrs app's docker-compose network. The electrs service
#   listens on :50001 for Electrum TCP. We pre-set BHA_ELECTRS_HOST,
#   BHA_ELECTRS_PORT, and BHA_PAYOUT_SOURCE so on-chain payout
#   tracking works out of the box without wizard configuration.
#
# - We declare `bitcoin` as a dependency. Electrs already requires it,
#   so this is free for the user. Bitcoin RPC enables BIP110 signalling
#   detection on pool blocks (yellow vs blue cube markers on the chart).
#   Umbrel injects APP_BITCOIN_NODE_IP / APP_BITCOIN_RPC_PORT / _USER /
#   _PASS which the BITCOIN_RPC_* env block below forwards to the
#   daemon's detectBitcoindEnv().

version: "3.7"

services:
  app_proxy:
    environment:
      # Hostname must match the docker-compose project's web service.
      # Umbrel uses the app dir name (`rdouma-hashrate-autopilot`) as
      # the project prefix, so the web container resolves to
      # `rdouma-hashrate-autopilot_web_1`.
      APP_HOST: rdouma-dev-hashrate-autopilot_web_1
      APP_PORT: 3010
      PROXY_AUTH_ADD: "false"

  web:
    # Pin to the exact released version - never `:latest`. If `:latest`
    # ever points at a broken image, every Umbrel auto-update breaks
    # silently. Pinning here means Umbrel users get exactly what each
    # release tag's notes promise. Bump in lockstep with the
    # `umbrel-app.yml` `version:` field on every release.
    #
    # IMPORTANT: image tag has NO leading `v`. The publish workflow's
    # docker/metadata-action strips the `v` from the git tag by
    # convention - GHCR carries `1.4.2`, `1.4`, `1`, `latest`. We also
    # publish `v`-prefixed mirrors (`v1.4.2`, `v1.4`, `v1`) for safety,
    # but the canonical pin stays bare-semver to match what GHCR shows
    # in its UI.
    image: ghcr.io/rdouma/hashrate-autopilot:1.17.0-rc2
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      HTTP_PORT: 3010
      HTTP_HOST: 0.0.0.0
      DB_PATH: /app/data/state.db
      DASHBOARD_STATIC: packages/dashboard/dist
      # #331: at-rest encryption key for the DB-stored secrets. APP_SEED
      # is a per-app secret Umbrel derives from the device master seed -
      # stable across restarts and stored OUTSIDE this app's data dir, so
      # a state.db / app-data backup no longer contains the key needed to
      # decrypt the secrets. Zero user action. (Generic Docker / bare
      # metal set BHA_SECRET_KEY themselves; if unset the daemon falls
      # back to a generated keyfile beside state.db.)
      BHA_SECRET_KEY: "${APP_SEED}"
      # Bitcoin RPC auto-config (see note at top of file). Umbrel
      # injects APP_BITCOIN_* because `bitcoin` is a declared
      # dependency. The daemon's detectBitcoindEnv() picks these up
      # on first boot - no wizard configuration needed.
      BITCOIN_RPC_HOST: "${APP_BITCOIN_NODE_IP}"
      BITCOIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT}"
      BITCOIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      BITCOIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
      # Datum API auto-config (see note at top of file). Resolves to
      # the Umbrel Datum app's container on the shared cross-app
      # network. The daemon's `datum_api_url` config field is set via
      # the BHA_* env-override layer, so this overrides whatever is in
      # the database and the operator never needs to type it.
      BHA_DATUM_API_URL: "http://datum_datum_1:21000"
      # Electrs auto-config (see note at top of file). Resolves to the
      # Umbrel Electrs app's container on the shared cross-app network.
      # With host + port set and payout_source = electrs, the P&L
      # panel's on-chain earnings tracking works on first boot.
      BHA_ELECTRS_HOST: "electrs_electrs_1"
      BHA_ELECTRS_PORT: "50001"
      BHA_PAYOUT_SOURCE: "electrs"
